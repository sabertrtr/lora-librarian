<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>LoRA Librarian -- Curate</title>
<style>
  :root { --bg:#14161a; --card:#1c1f26; --line:#2c313c; --muted:#8b93a0; --radius:12px; }
  * { box-sizing:border-box; }
  body { font-family:system-ui,sans-serif; margin:0; padding:1.25rem 1.25rem 5rem; background:var(--bg); color:#e8eaed; }
  a { color:#9ec5ff; }
  .top { display:flex; align-items:baseline; gap:1rem; flex-wrap:wrap; }
  h1 { font-size:1.25rem; margin:0; }
  .sub { color:var(--muted); font-size:.85rem; }
  .nav { margin-left:auto; font-size:.9rem; display:flex; gap:1rem; }
  .tools { margin:.8rem 0 .4rem; display:flex; gap:.8rem; flex-wrap:wrap; align-items:center; }
  #filter { background:#0f1116; border:1px solid var(--line); border-radius:8px; color:#fff; padding:.4rem .6rem; font-size:.9rem; width:min(28rem,90vw); }
  #banner { display:none; margin:.5rem 0; padding:.5rem .8rem; border-radius:8px; background:#3a2417; border:1px solid #7a4a22; color:#ffcf9a; font-size:.85rem; }
  #banner.on { display:block; }

  .lsection { margin:1rem 0 0; border:1px solid transparent; border-radius:10px; padding:.2rem .35rem .4rem; transition:background .1s, border-color .1s; }
  .lsection.dropok { background:rgba(80,120,255,.10); border-color:#3b5bbf; }
  .lsection-head { display:flex; align-items:center; gap:.5rem; font-size:.8rem; letter-spacing:.05em; text-transform:uppercase;
                   color:#c3cad6; border-bottom:1px solid var(--line); padding:.15rem .25rem .35rem; margin-bottom:.4rem; }
  .lsection-head .count { color:var(--muted); font-weight:600; }
  .lsection-empty { color:#4b5563; font-style:italic; font-size:.76rem; padding:.35rem .5rem; }

  .lcard { background:var(--card); border:1px solid var(--line); border-radius:9px; margin:.3rem 0; overflow:hidden; }
  .lcard.dragging { opacity:.45; }
  .lcard.flagged { border-color:#8a5; }
  .lrow { display:flex; align-items:center; gap:.55rem; padding:.32rem .5rem; cursor:pointer; }
  .grip { cursor:grab; color:#5b6472; font-size:.9rem; flex:0 0 auto; }
  .lcard.open { cursor:default; }
  .mini { width:34px; height:44px; object-fit:cover; border-radius:5px; border:1px solid var(--line); background:#0c0d10; flex:0 0 auto; }
  .miniph { width:34px; height:44px; border-radius:5px; border:1px solid var(--line); background:linear-gradient(135deg,#232838,#161a22); flex:0 0 auto; }
  .cname { font-weight:600; color:#fff; font-size:.9rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .cflag { font-size:.62rem; padding:.05rem .4rem; border-radius:999px; background:rgba(200,160,60,.18); border:1px solid #8a5; color:#e6cd8a; white-space:nowrap; }
  .spacer { flex:1; }
  .civ { font-size:.68rem; white-space:nowrap; }
  .caret { color:var(--muted); font-size:.7rem; flex:0 0 auto; transition:transform .12s; }
  .lcard.open .caret { transform:rotate(90deg); }

  .detail { display:none; padding:.2rem .6rem .6rem; border-top:1px solid var(--line); }
  .lcard.open .detail { display:block; }
  .dtop { display:flex; gap:.7rem; margin:.5rem 0; }
  .thumb { width:120px; aspect-ratio:320/411; height:auto; object-fit:cover; border-radius:8px; border:1px solid var(--line); background:#0c0d10; flex:0 0 auto; }
  .thumbph { width:120px; aspect-ratio:320/411; border-radius:8px; border:1px solid var(--line); background:linear-gradient(135deg,#232838,#161a22); flex:0 0 auto; }
  .lora { font-family:ui-monospace,monospace; font-size:.72rem; color:#9ec5ff; word-break:break-all; margin-bottom:.35rem; }
  .chips { display:flex; flex-wrap:wrap; gap:.3rem; }
  .chip { font-size:.72rem; padding:.1rem .45rem; border-radius:999px; border:1px solid #4b5563; background:#0f1116; color:#dfe4ea; }
  .editline { width:100%; font-family:ui-monospace,monospace; font-size:.78rem; color:#ffe9a8; background:#161206; border:1px solid #4a3d12;
              border-radius:8px; padding:.45rem .55rem; resize:vertical; min-height:2.8rem; margin:.2rem 0; }
  .dactions { display:flex; align-items:center; gap:.5rem; flex-wrap:wrap; }
  .dlabel { font-size:.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
  button { cursor:pointer; border-radius:7px; border:1px solid #4b5563; padding:.28rem .7rem; font-size:.78rem; background:#20242d; color:#e8eaed; }
  .savebtn { background:#3b82f6; border-color:#3b82f6; color:#04122b; font-weight:600; }
  .rmbtn { background:transparent; border-color:#a25; color:#e08; }
  .altbtn2 { color:#9ec5ff; }
  .dstat { font-size:.72rem; color:var(--muted); }
  .raw { margin-top:.4rem; font-family:ui-monospace,monospace; font-size:.7rem; color:#8b93a0; background:#0c0d10; border:1px solid var(--line);
         border-radius:6px; padding:.3rem .45rem; word-break:break-all; }

  .vbtn { cursor:pointer; border:1px solid var(--line); background:#20242d; color:#e8eaed; border-radius:7px; padding:.32rem .7rem; font-size:.8rem; }
  .vbtn:hover { border-color:#9ec5ff; }

  /* list (default) vs grid view of the cards inside a section */
  .lcards { display:block; }
  body.grid-view .lcards { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:.45rem; align-items:start; }
  body.grid-view .lcard { margin:0; }

  /* list-view inline info beside the name (the mockup); hidden in grid view */
  .lrow { flex-wrap:nowrap; overflow:hidden; }
  .rowlora { font-family:ui-monospace,monospace; font-size:.72rem; color:#9ec5ff; white-space:nowrap; flex:0 0 auto; }
  .rowchips { display:flex; gap:.25rem; overflow:hidden; flex:0 1 auto; min-width:0; }
  .rowchips .chip { white-space:nowrap; flex:0 0 auto; }
  .rowalt { flex:0 0 auto; }
  body.grid-view .rowlora, body.grid-view .rowchips, body.grid-view .rowalt { display:none; }

  /* cleanup modal */
  .cu-modal { position:fixed; inset:0; z-index:9500; background:rgba(0,0,0,.62); display:flex; align-items:flex-start; justify-content:center; padding:5vh 3vw; }
  .cu-box { background:var(--card); border:1px solid var(--line); border-radius:12px; width:min(820px,96vw); max-height:88vh; display:flex; flex-direction:column; overflow:hidden; }
  .cu-head { display:flex; align-items:center; gap:.6rem; padding:.7rem .9rem; border-bottom:1px solid var(--line); }
  .cu-head b { color:#fff; }
  #cuClose { margin-left:auto; background:none; border:none; color:var(--muted); font-size:1.15rem; cursor:pointer; }
  .cu-tools { display:flex; align-items:center; gap:.9rem; padding:.6rem .9rem; border-bottom:1px solid var(--line); font-size:.85rem; }
  .cu-tools label { cursor:pointer; }
  .cu-tools .spacer { flex:1; }
  .cu-del { cursor:pointer; background:#8a3341; border:none; color:#fff; border-radius:7px; padding:.35rem .8rem; font-size:.82rem; }
  .cu-del[disabled] { opacity:.5; cursor:default; }
  .cu-list { overflow-y:auto; padding:.3rem .6rem; }
  .cu-empty { color:var(--muted); font-style:italic; padding:1.6rem; text-align:center; }
  .cu-item { display:flex; align-items:center; gap:.55rem; padding:.32rem .4rem; border-bottom:1px solid #23262e; font-size:.78rem; cursor:pointer; }
  .cu-item:hover { background:#181b21; }
  .cu-marker { font-size:.6rem; font-weight:700; padding:.05rem .4rem; border-radius:4px; flex:0 0 auto; }
  .cu-marker.superseded { background:rgba(200,160,60,.18); color:#e6cd8a; }
  .cu-marker.removed { background:rgba(200,80,90,.18); color:#f0a0a8; }
  .cu-cat { color:var(--muted); flex:0 0 auto; max-width:11rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .cu-content { font-family:ui-monospace,monospace; color:#cbd3df; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1 1 auto; }
</style>
</head>
<body>
  <div class="top">
    <h1>Curate</h1>
    <span class="sub" id="sub">Loading…</span>
    <span class="nav">
      <a id="libraryLink" href="#">📚 Library</a>
      <a id="collectionLink" href="#">🗃 Collection</a>
      <a id="galleryLink" href="#">↩ Gallery</a>
    </span>
  </div>
  <div class="tools">
    <input id="filter" placeholder="Filter by name, tag, category, lora…" autocomplete="off">
    <span class="sub" id="fcount"></span>
    <button id="viewToggle" class="vbtn">▦ Grid view</button>
    <button id="cleanupBtn" class="vbtn">🧹 Cleanup</button>
    <span class="sub">· drag a card onto a category to move it · click to expand</span>
  </div>
  <div id="banner"></div>
  <div id="sections"></div>

  <div id="cuModal" class="cu-modal" style="display:none">
    <div class="cu-box">
      <div class="cu-head"><b>Cleanup — commented-out entries</b><button id="cuClose" title="Close (Esc)">✕</button></div>
      <div class="cu-tools">
        <label><input type="checkbox" id="cuAll"> select all</label>
        <span class="sub" id="cuCount"></span>
        <span class="spacer"></span>
        <button id="cuDelete" class="cu-del" disabled>Delete selected</button>
      </div>
      <div id="cuList" class="cu-list"></div>
    </div>
  </div>

<script src="/hoverpreview.js"></script>
<script src="/alternates.js"></script>
<script src="/catpicker.js"></script>
<script>
const K = new URLSearchParams(location.search).get('k');
const authHeaders = K ? { 'x-service-token': K } : {};
const kq = K ? `?k=${encodeURIComponent(K)}` : '';
document.getElementById('libraryLink').href = '/library' + kq;
document.getElementById('collectionLink').href = '/collection' + kq;
document.getElementById('galleryLink').href = '/gallery' + kq;
HoverPreview.init({ headers: authHeaders });
Alternates.init({ headers: authHeaders, token: K });

function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Split a composed line on TOP-LEVEL commas (brace + escaped-paren aware) so we
// can pull the display name (field 1) from an edited line without a reload.
function splitTopLevel(s){
  const out=[]; let buf='', brace=0, ep=0;
  for(let i=0;i<s.length;i++){ const ch=s[i];
    if(ch==='\\' && (s[i+1]==='('||s[i+1]===')')){ if(s[i+1]==='(')ep++; else if(ep>0)ep--; buf+=ch+s[i+1]; i++; continue; }
    if(ch==='{')brace++; else if(ch==='}'&&brace>0)brace--;
    if(ch===',' && !brace && !ep){ out.push(buf.trim()); buf=''; } else buf+=ch;
  }
  if(buf.trim())out.push(buf.trim()); return out;
}
function deriveName(line){
  const f=splitTopLevel(line); const first=f[0]||'';
  const name=/^<lora:/i.test(first)?(f[1]||first):first;
  return (name||'(unnamed)').replace(/\\([()])/g,'$1');
}

let ALLCATS=[], CATS={}, revision='';
const host=document.getElementById('sections'), bannerEl=document.getElementById('banner');
let dragged=null;

async function load(){
  try{
    const r=await fetch('/curate-data',{headers:authHeaders});
    if(!r.ok) throw new Error((await r.json().catch(()=>({}))).error||r.status);
    const d=await r.json();
    ALLCATS=d.allCategories||[]; revision=d.revision;
    CatPicker.init({ headers: authHeaders, categories: ALLCATS });
    CATS={}; for(const c of (d.categories||[])) CATS[c.category]=c.items;
    const total=Object.values(CATS).reduce((n,a)=>n+a.length,0);
    document.getElementById('sub').textContent=`${total} entries · ${ALLCATS.length} categories`;
    render();
  }catch(e){ document.getElementById('sub').textContent='Failed to load: '+e.message; }
}

function showBanner(msg){ bannerEl.textContent=msg; bannerEl.classList.add('on'); }

async function mutate(path, body){
  try{
    const r=await fetch(path,{method:'POST',headers:{...authHeaders,'Content-Type':'application/json'},body:JSON.stringify({...body, baseRevision:revision})});
    const d=await r.json().catch(()=>({}));
    if(r.status===409){ showBanner('Another window changed characters.yaml — reloading…'); setTimeout(load,900); return {conflict:true}; }
    if(!r.ok){ return {error:d.error||('HTTP '+r.status)}; }
    revision=d.revision;
    return d;
  }catch(e){ return {error:e.message}; }
}

function render(){
  host.innerHTML='';
  const f=document.getElementById('filter').value.trim().toLowerCase();
  let shown=0;
  for(const cat of ALLCATS){
    const items=(CATS[cat]||[]).filter(it=> !f || (cat+' '+(it.name||'')+' '+(it.stem||'')+' '+(it.tags||[]).join(' ')).toLowerCase().includes(f));
    if(f && !items.length) continue;            // while filtering, hide empty sections
    shown+=items.length;
    host.appendChild(sectionEl(cat, items));
  }
  document.getElementById('fcount').textContent = f ? `${shown} match` : '';
}

function sectionEl(cat, items){
  const sec=document.createElement('div');
  sec.className='lsection'; sec.dataset.category=cat;
  sec.innerHTML=`<div class="lsection-head"><span>${esc(cat)}</span><span class="count">${items.length}</span></div><div class="lcards"></div>`;
  const cardsEl=sec.querySelector('.lcards');
  if(!items.length) cardsEl.innerHTML=`<div class="lsection-empty">— empty — drop a card here</div>`;
  for(const it of items) cardsEl.appendChild(cardEl(it, cat));
  sec.addEventListener('dragover', e=>{ if(dragged && dragged.fromCategory!==cat){ e.preventDefault(); sec.classList.add('dropok'); } });
  sec.addEventListener('dragleave', e=>{ if(!sec.contains(e.relatedTarget)) sec.classList.remove('dropok'); });
  sec.addEventListener('drop', e=>{ e.preventDefault(); sec.classList.remove('dropok'); if(dragged && dragged.fromCategory!==cat) doMove(dragged, cat); });
  return sec;
}

function cardEl(it, category){
  const card=document.createElement('div');
  card.className='lcard'+(it.flagged?' flagged':'');
  card.draggable=true;
  const mini = it.imageThumb
    ? `<img class="mini" src="${esc(it.imageThumb)}" data-full="${esc(it.imageFull||'')}" data-version="${esc(it.versionId||'')}" data-model="${esc(it.modelId||'')}">`
    : `<div class="miniph"></div>`;
  const thumb = it.imageThumb
    ? `<img class="thumb" src="${esc(it.imageThumb)}" data-full="${esc(it.imageFull||'')}" data-version="${esc(it.versionId||'')}" data-model="${esc(it.modelId||'')}">`
    : `<div class="thumbph"></div>`;
  const civ = it.modelId ? `<a class="civ" href="https://civitai.com/models/${it.modelId}" target="_blank" rel="noopener">civitai ↗</a>` : '';
  const chips=(it.tags||[]).map(t=>`<span class="chip">${esc(t)}</span>`).join('') || '<span class="chip" style="opacity:.6">no tags</span>';
  card.innerHTML=`
    <div class="lrow">
      <span class="grip" title="drag to another category">⠿</span>
      ${mini}
      <span class="cname">${esc(it.name||'(unnamed)')}</span>
      ${it.flagged?'<span class="cflag">NEEDS_REPLACEMENT</span>':''}
      <span class="rowlora">&lt;lora:${esc(it.stem||'?')}:${esc(it.weight||'1')}&gt;</span>
      <span class="rowchips">${chips}</span>
      <button class="altbtn rowalt">🔍 alternates</button>
      <span class="spacer"></span>
      ${civ}
      <span class="caret">▸</span>
    </div>
    <div class="detail">
      <div class="dtop">
        ${thumb}
        <div style="min-width:0">
          <div class="lora">&lt;lora:${esc(it.stem||'?')}:${esc(it.weight||'1')}&gt;</div>
          <div class="chips">${chips}</div>
        </div>
      </div>
      <textarea class="editline" spellcheck="false">${esc(it.rawLine)}</textarea>
      <div class="dactions">
        <button class="savebtn">Save line</button>
        <button class="altbtn2 altbtn">🔍 alternates</button>
        <span class="dlabel">move to</span><span class="recat"></span>
        <span class="spacer"></span>
        <button class="rmbtn">Remove</button>
        <span class="dstat"></span>
      </div>
      <div class="raw">${esc(it.rawLine)}</div>
    </div>`;

  // expand on click of the row (ignore clicks on links/buttons; no drag while open)
  card.querySelector('.lrow').addEventListener('click', e=>{
    if(e.target.closest('a,button')) return;
    const open=card.classList.toggle('open');
    card.draggable=!open;                       // no drag while expanded (lets the textarea select)
  });

  // drag
  card.addEventListener('dragstart', e=>{ dragged={it, fromCategory:category, card}; card.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; try{e.dataTransfer.setData('text/plain', it.rawLine);}catch(_){} });
  card.addEventListener('dragend', ()=>{ card.classList.remove('dragging'); dragged=null; document.querySelectorAll('.lsection.dropok').forEach(s=>s.classList.remove('dropok')); });

  // hover previews
  card.querySelectorAll('img.mini, img.thumb').forEach(img=>{ if(img.dataset.full||img.dataset.version||img.dataset.model) HoverPreview.bind(img); });

  // alternates
  card.querySelectorAll('.altbtn').forEach(b=> b.addEventListener('click', e=>{ e.stopPropagation(); Alternates.open({name: it.name, baseModel: it.civitaiBaseModel}); }));
  // same shared re-categorize control as everywhere else; moving re-homes the card
  const recatHost = card.querySelector('.recat');
  if(recatHost) CatPicker.recategorize(recatHost, { stem: it.stem, category, onDone: ()=> load() });

  // save (edit)
  const stat=card.querySelector('.dstat');
  card.querySelector('.savebtn').addEventListener('click', async ()=>{
    const newLine=card.querySelector('.editline').value.trim();
    if(!newLine){ stat.textContent='line is empty'; return; }
    if(newLine===it.rawLine){ stat.textContent='no change'; return; }
    stat.textContent='saving…';
    const r=await mutate('/curate/edit',{category, oldLineText:it.rawLine, newLineText:newLine});
    if(r.conflict) return;
    if(r.error){ stat.textContent='failed: '+r.error; return; }
    it.rawLine=r.lineText;
    card.querySelector('.raw').textContent=r.lineText;
    card.querySelector('.editline').value=r.lineText;
    card.querySelector('.cname').textContent=deriveName(r.lineText);
    stat.textContent='saved ✓';
  });

  // remove
  card.querySelector('.rmbtn').addEventListener('click', async ()=>{
    if(!confirm(`Remove "${it.name||it.stem}" from ${category}?\n\nThis deletes the line from characters.yaml.`)) return;
    stat.textContent='removing…';
    const r=await mutate('/curate/remove',{lineText:it.rawLine, category});
    if(r.conflict) return;
    if(r.error){ stat.textContent='failed: '+r.error; return; }
    CATS[category]=(CATS[category]||[]).filter(x=>x!==it);
    render();
  });

  return card;
}

async function doMove(d, toCat){
  const { it, fromCategory }=d;
  const r=await mutate('/curate/move',{lineText:it.rawLine, fromCategory, toCategory:toCat});
  if(r.conflict) return;
  if(r.error){ showBanner('Move failed: '+r.error); setTimeout(()=>bannerEl.classList.remove('on'),2500); return; }
  CATS[fromCategory]=(CATS[fromCategory]||[]).filter(x=>x!==it);
  (CATS[toCat]=CATS[toCat]||[]).push(it);
  render();
}

let ft=null;
document.getElementById('filter').addEventListener('input', ()=>{ clearTimeout(ft); ft=setTimeout(render,120); });

// ---- list / grid view toggle (CSS-only; no re-render needed) ----
const VIEW_KEY='curate_view';
function applyView(){
  const grid=localStorage.getItem(VIEW_KEY)==='grid';
  document.body.classList.toggle('grid-view', grid);
  document.getElementById('viewToggle').textContent = grid ? '≣ List view' : '▦ Grid view';
}
document.getElementById('viewToggle').addEventListener('click', ()=>{
  localStorage.setItem(VIEW_KEY, localStorage.getItem(VIEW_KEY)==='grid' ? 'list' : 'grid');
  applyView();
});
applyView();

// ---- cleanup modal: purge commented-out (# SUPERSEDED / # REMOVED) lines ----
const cuModal=document.getElementById('cuModal'), cuList=document.getElementById('cuList');
const cuCount=document.getElementById('cuCount'), cuDelete=document.getElementById('cuDelete'), cuAll=document.getElementById('cuAll');
let cuEntries=[], cuRevision='';

function openCleanup(){ cuModal.style.display='flex'; loadCleanup(); }
function closeCleanup(){ cuModal.style.display='none'; }
async function loadCleanup(){
  cuList.innerHTML='<div class="cu-empty">Loading…</div>'; cuAll.checked=false;
  try{
    const r=await fetch('/cleanup-data',{headers:authHeaders});
    const d=await r.json();
    if(!r.ok) throw new Error(d.error||r.status);
    cuEntries=d.entries||[]; cuRevision=d.revision;
    renderCleanup();
  }catch(e){ cuList.innerHTML='<div class="cu-empty">Failed: '+esc(e.message)+'</div>'; }
}
function renderCleanup(){
  if(!cuEntries.length){ cuList.innerHTML='<div class="cu-empty">No commented-out entries. 🎉</div>'; cuCount.textContent=''; cuDelete.disabled=true; return; }
  cuList.innerHTML='';
  for(const e of cuEntries){
    const row=document.createElement('label'); row.className='cu-item';
    row.innerHTML=`<input type="checkbox" data-idx="${e.lineIndex}">`+
      `<span class="cu-marker ${e.marker.toLowerCase()}">${esc(e.marker)}</span>`+
      `<span class="cu-cat">${esc(e.category||'—')}</span>`+
      `<span class="cu-content">${esc(e.content)}</span>`;
    cuList.appendChild(row);
  }
  cuList.querySelectorAll('input').forEach(i=>i.addEventListener('change', updateCuSel));
  updateCuSel();
}
function cuSelected(){ return [...cuList.querySelectorAll('input:checked')].map(i=>parseInt(i.dataset.idx,10)); }
function updateCuSel(){ const n=cuSelected().length; cuCount.textContent=`${cuEntries.length} commented · ${n} selected`; cuDelete.disabled=!n; }

document.getElementById('cleanupBtn').addEventListener('click', openCleanup);
document.getElementById('cuClose').addEventListener('click', closeCleanup);
cuModal.addEventListener('click', e=>{ if(e.target===cuModal) closeCleanup(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape' && cuModal.style.display==='flex') closeCleanup(); });
cuAll.addEventListener('change', ()=>{ cuList.querySelectorAll('input').forEach(i=>i.checked=cuAll.checked); updateCuSel(); });
cuDelete.addEventListener('click', async ()=>{
  const idx=cuSelected();
  if(!idx.length) return;
  if(!confirm(`Permanently delete ${idx.length} commented line(s) from characters.yaml?\n\nThis cannot be undone.`)) return;
  cuDelete.disabled=true; cuDelete.textContent='Deleting…';
  try{
    const r=await fetch('/cleanup/delete',{method:'POST',headers:{...authHeaders,'Content-Type':'application/json'},body:JSON.stringify({lineIndices:idx, baseRevision:cuRevision})});
    const d=await r.json().catch(()=>({}));
    if(r.status===409){ await loadCleanup(); return; }          // file moved on -> reload list
    if(!r.ok) throw new Error(d.error||r.status);
    revision=d.revision;                                        // keep the main page's revision fresh
    await loadCleanup();
  }catch(e){ alert('Delete failed: '+e.message); }
  finally{ cuDelete.textContent='Delete selected'; }
});
