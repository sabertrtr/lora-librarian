<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>LoRA Librarian -- Library</title>
<style>
  :root { --bg:#14161a; --card:#1c1f26; --line:#2c313c; --muted:#8b93a0; --sel:#ffd34e; --radius:12px; }
  * { box-sizing:border-box; }
  body { font-family:system-ui,sans-serif; margin:0; padding:1.25rem 1.25rem 4rem; background:var(--bg); color:#e8eaed; }
  a { color:#9ec5ff; }
  .top { display:flex; align-items:baseline; gap:1rem; flex-wrap:wrap; }
  h1 { font-size:1.25rem; margin:0; }
  .sub { color:var(--muted); font-size:.85rem; }
  .nav { margin-left:auto; font-size:.9rem; }
  .tools { margin:.8rem 0 .4rem; display:flex; gap:.6rem; flex-wrap:wrap; align-items:center; }
  #filter { background:#0f1116; border:1px solid var(--line); border-radius:8px; color:#fff; padding:.4rem .6rem; font-size:.9rem; width:min(28rem,90vw); }
  #empty { color:var(--muted); font-style:italic; padding:2rem 0; }

  .section { margin:1.4rem 0 0; }
  .section-head { display:flex; align-items:center; gap:.5rem; font-size:.8rem; letter-spacing:.06em; text-transform:uppercase;
                  color:#c3cad6; border-bottom:1px solid var(--line); padding-bottom:.35rem; margin-bottom:.7rem; }
  .section-head .count { color:var(--muted); font-weight:600; }

  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:.8rem; }
  .card { display:flex; gap:.8rem; background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:.7rem; }
  .card.flagged { border-color:#8a5; }

  .ph { flex:0 0 auto; width:156px; aspect-ratio:320/411; height:auto; border-radius:var(--radius); border:1px solid var(--line);
        background:linear-gradient(135deg,#232838,#161a22); display:flex; align-items:center; justify-content:center;
        color:#4b5563; font-size:.62rem; text-align:center; padding:.3rem; overflow:hidden; }
  img.thumb { flex:0 0 auto; width:156px; aspect-ratio:320/411; height:auto; object-fit:cover; border-radius:var(--radius); border:1px solid var(--line); background:#0c0d10; }
  .civ { font-size:.68rem; margin-left:.4rem; }
  .body { flex:1 1 auto; min-width:0; }
  .head { display:flex; align-items:center; gap:.5rem; flex-wrap:wrap; margin-bottom:.35rem; }
  .name { font-size:1.02rem; font-weight:700; color:#fff; word-break:break-word; }
  .flag { font-size:.68rem; padding:.08rem .45rem; border-radius:999px; background:rgba(200,160,60,.18); border:1px solid #8a5; color:#e6cd8a; }
  .lora { font-family:ui-monospace,monospace; font-size:.72rem; color:#9ec5ff; word-break:break-all; margin:.1rem 0 .4rem; }
  .chips { display:flex; flex-wrap:wrap; gap:.3rem; }
  .chip { font-size:.76rem; padding:.12rem .45rem; border-radius:999px; border:1px solid #4b5563; background:#0f1116; color:#dfe4ea; }
  .chip.variant { border-style:dashed; color:#bfe3c9; } /* {a|b} dynamic-prompt tag */
  .raw { margin-top:.45rem; font-family:ui-monospace,monospace; font-size:.72rem; color:#96a0b0; background:#0c0d10;
         border:1px solid var(--line); border-radius:8px; padding:.35rem .5rem; word-break:break-all; display:none; }
  .card.show-raw .raw { display:block; }
  .rawtoggle { cursor:pointer; font-size:.68rem; color:var(--muted); background:none; border:none; padding:.1rem 0; }

  /* nested category tree (mirrors the Categories page headers) */
  .node.depth0 { margin-top:1rem; }
  .noderow { display:flex; align-items:center; gap:.5rem; padding:.3rem .45rem; border-radius:8px; border:1px solid transparent; margin-bottom:.5rem; }
  .node.depth0 > .noderow { background:#1a1d24; border-color:var(--line); }
  .node.depth0 > .noderow .seg { font-size:1.05rem; font-weight:700; text-transform:capitalize; color:#fff; }
  .noderow .seg { font-size:.9rem; color:#dfe4ea; font-weight:600; }
  .noderow .hbadge { font-size:.58rem; color:#0b0d11; background:#2dd47a; border-radius:4px; padding:.02rem .3rem; }
  .noderow .path { font-size:.66rem; color:var(--muted); font-family:ui-monospace,monospace; }
  .noderow .count { color:var(--muted); font-size:.75rem; font-weight:600; }
  .noderow .spacer { flex:1; }
  .caret { cursor:pointer; color:var(--muted); width:1rem; text-align:center; user-select:none; flex:0 0 auto; }
  .caret.leaf { visibility:hidden; }
  .children { margin-left:1.3rem; border-left:1px solid var(--line); padding-left:.6rem; }
  .node.collapsed > .children, .node.collapsed > .lgrid { display:none; }
  .lgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:.8rem; margin-bottom:.6rem; }
</style>
</head>
<body>
  <div class="top">
    <h1>LoRA Library</h1>
    <span class="sub" id="sub">Loading…</span>
    <span class="nav"><a id="curateLink" href="#">✎ Curate</a> · <a id="collectionLink" href="#">🗃 Collection</a> · <a id="galleryLink" href="#">↩ Staging gallery</a></span>
  </div>
  <div class="tools">
    <input id="filter" placeholder="Filter by name, tag, category, or lora…" autocomplete="off">
    <span class="sub" id="fcount"></span>
  </div>
  <div id="sections"></div>
  <div id="empty" style="display:none">characters.yaml has no entries.</div>

<script src="/hoverpreview.js"></script>
<script src="/alternates.js"></script>
<script src="/catpicker.js"></script>
<script>
const K = new URLSearchParams(location.search).get('k');
const authHeaders = K ? { 'x-service-token': K } : {};
const kq = K ? `?k=${encodeURIComponent(K)}` : '';
document.getElementById('galleryLink').href = '/gallery' + kq;
document.getElementById('collectionLink').href = '/collection' + kq;
document.getElementById('curateLink').href = '/curate' + kq;

function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
HoverPreview.init({ headers: authHeaders });
let CATS = [];
const HEADERS = ['character','style','concept','environment'];
const COLLAPSE_KEY = 'lib_collapsed';
let collapsed = new Set(JSON.parse(localStorage.getItem(COLLAPSE_KEY) || '[]'));

async function load(){
  try {
    const r = await fetch('/lines', { headers:authHeaders });
    if(!r.ok) throw new Error((await r.json().catch(()=>({}))).error || r.status);
    CATS = (await r.json()).categories || [];
    try { const cr = await fetch('/categories', { headers:authHeaders }); if(cr.ok) CatPicker.init({ headers:authHeaders, categories:(await cr.json()).categories || [] }); } catch(_){}
  } catch(e){ document.getElementById('sub').textContent = 'Failed to load: '+e.message; return; }

  const total = CATS.reduce((n,c)=>n+c.items.length,0);
  document.getElementById('sub').textContent = `${total} models · ${CATS.length} categories`;
  document.getElementById('empty').style.display = total ? 'none' : 'block';
  render('');
}

function cardEl(it, category){
  const card = document.createElement('div');
  card.className = 'card' + (it.flagged ? ' flagged' : '');
  const chips = (it.tags||[]).map(t =>
    `<span class="chip${t.includes('|')||t.startsWith('{')?' variant':''}">${esc(t)}</span>`).join('');
  const left = it.imageThumb
    ? `<img class="thumb" src="${esc(it.imageThumb)}" data-full="${esc(it.imageFull||'')}" data-version="${esc(it.versionId||'')}" data-model="${esc(it.modelId||'')}">`
    : `<div class="ph">${esc(it.stem || 'LoRA')}</div>`;
  const civLink = it.modelId ? `<a class="civ" href="https://civitai.com/models/${it.modelId}" target="_blank" rel="noopener">civitai ↗</a>` : '';
  card.innerHTML = `
    ${left}
    <div class="body">
      <div class="head">
        <span class="name">${esc(it.name || '(unnamed)')}</span>
        ${it.flagged ? '<span class="flag">NEEDS_REPLACEMENT</span>' : ''}
        ${civLink}
        <button class="altbtn">🔍 alternates</button>
        <span class="recat"></span>
      </div>
      <div class="lora">&lt;lora:${esc(it.stem||'?')}:${esc(it.weight||'1')}&gt;</div>
      <div class="chips">${chips || '<span class="chip" style="opacity:.6">no tags</span>'}</div>
      <button class="rawtoggle">▸ raw line</button>
      <div class="raw">${esc(it.rawLine)}</div>
    </div>`;
  card.querySelector('.rawtoggle').addEventListener('click', ()=> card.classList.toggle('show-raw'));
  card.querySelector('.altbtn').addEventListener('click', ()=> Alternates.open({name: it.name, baseModel: it.civitaiBaseModel}));
  const recatHost = card.querySelector('.recat');
  if(recatHost) CatPicker.recategorize(recatHost, { stem: it.stem, category, onDone: ()=> load() });
  const thumb = card.querySelector('img.thumb');
  if(thumb) HoverPreview.bind(thumb);
  // stash searchable text
  card._hay = (category + ' ' + (it.name||'') + ' ' + (it.stem||'') + ' ' + (it.tags||[]).join(' ')).toLowerCase();
  return card;
}

function buildTree(cats){
  const root = { path:'', name:'', items:[], children:{} };
  for(const c of cats){
    let node = root, path='';
    for(const seg of c.category.split('/')){
      path = path ? path+'/'+seg : seg;
      node.children[seg] = node.children[seg] || { path, name:seg, items:[], children:{} };
      node = node.children[seg];
    }
    node.items = c.items;
  }
  return root;
}

function renderNode(node, depth, f){
  const cards = node.items.map(it => cardEl(it, node.path)).filter(el => !f || el._hay.includes(f));
  const childWraps = []; let childShown = 0;
  for(const k of Object.keys(node.children).sort()){
    const r = renderNode(node.children[k], depth+1, f);
    childShown += r.shown;
    if(r.el) childWraps.push(r.el);
  }
  const shown = cards.length + childShown;
  if(shown===0 && (f || depth>0)) return { el:null, shown:0 };

  const wrap = document.createElement('div');
  wrap.className = 'node depth'+depth + (collapsed.has(node.path)?' collapsed':'');
  const hasContent = cards.length>0 || childWraps.length>0;
  const isHeader = depth===0 && HEADERS.includes(node.path);
  wrap.innerHTML = `<div class="noderow">
      <span class="caret${hasContent?'':' leaf'}">${collapsed.has(node.path)?'▸':'▾'}</span>
      <span class="seg">${esc(node.name)}</span>
      ${isHeader?'<span class="hbadge">header</span>':''}
      ${depth>0?`<span class="path">${esc(node.path)}</span>`:''}
      <span class="count">${shown}</span>
      <span class="spacer"></span>
    </div>`;
  const caret = wrap.querySelector('.caret');
  caret.addEventListener('click', ()=>{
    if(!hasContent) return;
    if(collapsed.has(node.path)) collapsed.delete(node.path); else collapsed.add(node.path);
    localStorage.setItem(COLLAPSE_KEY, JSON.stringify([...collapsed]));
    wrap.classList.toggle('collapsed');
    caret.textContent = collapsed.has(node.path)?'▸':'▾';
  });
  if(cards.length){ const g=document.createElement('div'); g.className='lgrid'; cards.forEach(c=>g.appendChild(c)); wrap.appendChild(g); }
  if(childWraps.length){ const ch=document.createElement('div'); ch.className='children'; childWraps.forEach(c=>ch.appendChild(c)); wrap.appendChild(ch); }
  return { el:wrap, shown };
}

function render(filter){
  const host = document.getElementById('sections');
  host.innerHTML = '';
  const f = (filter||'').trim().toLowerCase();
  const roots = Object.values(buildTree(CATS).children);
  roots.sort((a,b)=>{ const ai=HEADERS.indexOf(a.path), bi=HEADERS.indexOf(b.path);
    if(ai>=0||bi>=0){ if(ai<0) return 1; if(bi<0) return -1; return ai-bi; } return a.name.localeCompare(b.name); });
  let shown = 0;
  for(const r of roots){ const res = renderNode(r, 0, f); if(res.el) host.appendChild(res.el); shown += res.shown; }
  document.getElementById('fcount').textContent = f ? `${shown} match "${filter.trim()}"` : '';
}

let ft=null;
document.getElementById('filter').addEventListener('input', e=>{
  clearTimeout(ft); const v=e.target.value; ft=setTimeout(()=>render(v),120);
});

Alternates.init({ headers: authHeaders, token: K });

load();
</script>
</body>
</html>
